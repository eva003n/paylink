server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s;
    set $backend_upstream backend:8000;

    types {
        text/html                             html htm;
        text/css                              css;
        text/xml                             xml;
        image/gif                             gif;
        image/jpeg                            jpeg jpg;
        text/javascript                       js mjs;      # ← fixed
        application/wasm                      wasm;
        application/json                      json;
        text/plain                            txt;
        image/svg+xml                         svg svgz;
        image/x-icon                          ico;
        image/webp                            webp;
        font/woff                             woff;
        font/woff2                            woff2;
        font/ttf                              ttf;
        font/otf                              otf;
    }
    default_type application/octet-stream;

    # Static assets (^~ prevents regex override)
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Rewrite /api to /api/v1
    location /api/ {
        rewrite ^/api/(.*)$ /api/v1/$1 break;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      # Handle CORS preflight
       if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $http_origin;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept";
        add_header Access-Control-Max-Age 1728000;
        add_header Content-Length 0;
        return 204;
    }
    }

    # Deny fallback for known asset extensions
    location ~ \.(js|mjs|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|otf|json|ico|webp|wasm)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback LAST
    location / {
        try_files $uri /index.html;
    }
}